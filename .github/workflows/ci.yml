name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify module graph
        run: go mod verify

      - name: Build
        run: go build -trimpath -v ./...

      - name: Test with race detector
        run: go test ./... -race -count=1 -timeout 120s

      - name: Vet
        run: go vet ./...

  quality:
    name: Format and release contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: check

  vulnerability-scan:
    name: Reachable vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1.1.0
        with:
          go-version-input: "1.26.1"
          go-package: ./...
