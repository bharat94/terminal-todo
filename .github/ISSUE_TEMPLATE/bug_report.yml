name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets or a real task store.
        Report vulnerabilities privately through SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `todo --version`, or the commit SHA.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: filesystem
    attributes:
      label: Filesystem or storage
      description: Local filesystem, network mount, synchronized folder, or other storage.
      placeholder: Local APFS
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use synthetic task data and include exact commands or MCP calls.
      placeholder: |
        1. todo init
        2. todo add "Synthetic task"
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized errors or `todo doctor` output.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, personal data, and real task-store contents.
          required: true
        - label: This is not an undisclosed security vulnerability.
          required: true
